name: Publiceer website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Haal websitebestanden op
        uses: actions/checkout@v4
      - name: Stel GitHub Pages in
        uses: actions/configure-pages@v5
      - name: Maak websitepakket
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Publiceer website
        id: deployment
        uses: actions/deploy-pages@v4
